services:
  - type: web
    name: legal-ninja-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        scope: all
      - key: JWT_SECRET
        scope: all
      - key: OPENAI_API_KEY
        scope: all
      - key: GEMINI_API_KEY
        scope: all
      - key: GROQ_API_KEY
        scope: all
      - key: PAYSTACK_SECRET_KEY
        scope: all
      - key: PAYSTACK_PUBLIC_KEY
        scope: all
      - key: ADMIN_SECRET_KEY
        scope: all
      - key: FRONTEND_URL
        scope: all
